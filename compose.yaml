name: dokdok

services:
  app:
    profiles: ["app"]
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dokdok-app
    environment:
      TZ: Asia/Seoul
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILE}
      SPRING_DATASOURCE_URL: ${DB_URL:-jdbc:postgresql://postgres:5432/dokdok}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      KAKAO_CLIENT_ID: ${KAKAO_CLIENT_ID}
      KAKAO_CLIENT_SECRET: ${KAKAO_CLIENT_SECRET}
      KAKAO_API_KEY: ${KAKAO_API_KEY}
      KAKAO_API_BASE_URL: ${KAKAO_API_BASE_URL}
      MINIO_INTERNAL_ENDPOINT: ${MINIO_INTERNAL_ENDPOINT:-http://minio:9000}
      MINIO_EXTERNAL_ENDPOINT: ${MINIO_EXTERNAL_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET:-dokdok-storage}
      REDIS_HOST: ${REDIS_HOST:-redis}
      JWT_SECRET: ${JWT_SECRET}

    ports:
      - '8080:8080'
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    volumes:
      - app_logs:/app/logs
    networks:
      - dokdok-network

  postgres:
    profiles: ["app", "local"]
    image: 'postgres:16'
    container_name: dokdok-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dokdok}
      POSTGRES_USER: ${POSTGRES_USER:-dokdok}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: Asia/Seoul
    ports:
      - '5432:5432'
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - dokdok-network

  redis:
    profiles: ["app", "local"]
    image: redis:7-alpine
    container_name: dokdok-redis
    ports:
      - '6379:6379'
    restart: unless-stopped
    networks:
      - dokdok-network

  minio:
    profiles: ["app", "local"]
    image: minio/minio:latest
    container_name: dokdok-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
      MINIO_SERVER_URL: ${MINIO_SERVER_URL:-https://storage.dokdok.site}
      TZ: Asia/Seoul
    command: server /data --console-address ":9001"
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    networks:
      - dokdok-network

volumes:
  app_logs:
  postgres_data:
  minio_data:

networks:
  dokdok-network:
    driver: bridge