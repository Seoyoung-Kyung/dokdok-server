
on:
  pull_request:
    branches: [ "main" ]      # 타깃 브랜치가 main PR
    types: [ closed ]         # PR이 닫힐 때(merge 또는 close)

jobs:
  deploy:
    if: >
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: SSH to EC2 and deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_PROD_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: POSTGRES_DB,POSTGRES_USER,POSTGRES_PASSWORD,DB_USERNAME,DB_PASSWORD,SPRING_PROFILE
          script: |
            set -e
            cd ${{ secrets.EC2_APP_DIR }}
            git fetch --all
            git reset --hard origin/main

            # .env 파일 생성
            cat > .env << EOF
            # Spring Profile
            SPRING_PROFILE=${SPRING_PROFILE}

            # PostgreSQL Database Configuration
            POSTGRES_DB=${POSTGRES_DB}
            POSTGRES_USER=${POSTGRES_USER}
            POSTGRES_PASSWORD=${POSTGRES_PASSWORD}

            # Application Database Connection
            DB_USERNAME=${DB_USERNAME}
            DB_PASSWORD=${DB_PASSWORD}
            EOF

            # 앱 프로필만 빌드/재시작 (모니터링 스택은 건드리지 않음)
            docker compose --profile app pull
            docker compose --profile app up -d --build app
            docker compose ps
        env:
          SPRING_PROFILE: prod
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}