spring:
  application:
    name: dokdok
  servlet:
    session:
      timeout: 30m  # 세션 타임아웃 30분
      cookie:
        same-site: lax  # 로컬 환경에서는 lax 사용
        secure: false   # HTTP에서도 쿠키 전송 허용

# Swagger/OpenAPI Configuration
springdoc:
  swagger-ui:
    servers:
      - url: http://localhost:8080
        description: 로컬 서버

# MinIO Configuration
minio:
  internal-endpoint: ${MINIO_INTERNAL_ENDPOINT:http://localhost:9000}
  external-endpoint: ${MINIO_EXTERNAL_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:dokdok-access-12!2123}
  secret-key: ${MINIO_SECRET_KEY:dokdok-secret-12!2123}
  bucket: ${MINIO_BUCKET:dokdok-storage}

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: dokdok

kakao:
  api:
    key: ${KAKAO_API_KEY:8f1260ebbbd18356d296fadc9bb82f58}
    base-url: ${KAKAO_API_BASE_URL:https://dapi.kakao.com}

ai:
  api:
    base-url: http://localhost:8000
    summary-path: /summaries/topics
    stt-path: /stt/summary

stt:
  temp-dir: ${STT_TEMP_DIR:}
